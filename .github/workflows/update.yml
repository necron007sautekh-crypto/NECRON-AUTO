name: Update VPN Configs

on:
  schedule:
    # Запуск каждый час
    - cron: '0 * * * *'
  # Ручной запуск
  workflow_dispatch:

# Разрешаем запись в репозиторий
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run config collector
        run: python scripts/update_configs.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add configs.json configs.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto update configs $(date +'%Y-%m-%d %H:%M UTC')"
          git push
