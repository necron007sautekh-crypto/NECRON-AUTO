name: Update Catwhite Configs

on:
  schedule:
    - cron: '0 */5 * * *'  # каждые 5 часов
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run config collector
        run: python scripts/update_configs.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add configs.json version.txt debug.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto update to version $(cat version.txt)"
          git push