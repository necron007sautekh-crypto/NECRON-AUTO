name: Update NECRON Configs

on:
  schedule:
    - cron: '0 * * * *'  # Каждый час
  workflow_dispatch:      # Ручной запуск

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run config collector
        run: |
          python scripts/update_configs.py
          echo "=== ПЕРВЫЕ 20 СТРОК НОВОГО configs.txt ==="
          head -n 20 configs.txt
          echo "=== КОНЕЦ ==="
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add configs.txt version.txt -f
          git status
          if git diff --staged --quiet; then
            echo "❌ НЕТ ИЗМЕНЕНИЙ для коммита"
          else
            git commit -m "🔄 Ежечасное обновление конфигов v$(cat version.txt)"
            git push
            echo "✅ Изменения запушены"
          fi
